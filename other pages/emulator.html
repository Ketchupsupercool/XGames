<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Emulator • XGames</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    :root{
      --x-red:#ff0000;
      --border: rgba(255,0,0,0.65);
      --glow: rgba(255,0,0,0.35);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      color:#fff;
      background:#000;
      overflow-y:auto;
    }

    a{ color:inherit; text-decoration:none; }

    .topbar{
      position:sticky;
      top:0;
      z-index:10;
      background:rgba(20,0,0,0.95);
      padding:12px 10px;
      box-shadow:0 0 15px var(--x-red);
      display:flex;
      gap:12px;
      justify-content:center;
      align-items:center;
      flex-wrap:wrap;
    }

    .brand{
      font-weight:bold;
      letter-spacing:.5px;
    }
    .brand .x{
      color:var(--x-red);
      text-shadow:0 0 15px var(--x-red);
    }

    button{
      background:var(--x-red);
      color:#fff;
      border:none;
      border-radius:6px;
      padding:9px 14px;
      cursor:pointer;
      font-weight:bold;
    }
    button:hover{
      background:darkred;
      box-shadow:0 0 10px var(--x-red);
    }

    .content{
      max-width:1100px;
      margin:0 auto;
      padding:20px 14px 40px;
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .info{
      background: rgba(255,0,0,0.12);
      border:1px solid var(--border);
      border-radius:12px;
      padding:14px;
      box-shadow:0 0 18px var(--glow);
      font-size:14px;
      line-height:1.45;
    }

    .emu-shell{
      width:100%;
      height:70vh;
      min-height:420px;
      border:3px solid var(--x-red);
      border-radius:16px;
      overflow:hidden;
      background:#000;
      box-shadow:0 0 20px var(--glow);
      position:relative;
    }

    iframe{
      width:100%;
      height:100%;
      border:0;
      background:#000;
    }

    .overlay{
      position:absolute;
      left:14px;
      bottom:14px;
      padding:8px 12px;
      border-radius:10px;
      border:1px solid rgba(255,0,0,0.35);
      background: rgba(0,0,0,0.55);
      font-size:12px;
      opacity:0.85;
      pointer-events:none;
    }
    .overlay b{ color:var(--x-red); }

    footer{
      text-align:center;
      opacity:0.7;
      font-size:12px;
      margin-top:10px;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="brand"><span class="x">X</span>Games • Emulator</div>
    <a href="/index.html"><button>Home</button></a>
  </div>

  <div class="content">
    <div class="info">
      <b>How to play:</b> Drag and drop a ROM file directly into the emulator window below.
      <br>
      <b>Note:</b> Some systems or games may not behave perfectly in a browser.
    </div>

    <div class="emu-shell">
      <iframe src="/webretro/index.html" allowfullscreen></iframe>
      <div class="overlay">Tip: <b>Drag &amp; drop</b> a ROM to start playing</div>
    </div>

    <footer>
      XGames Emulator • Powered by WebRetro
    </footer>
  </div>

</body>
</html>
